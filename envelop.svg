<!--?xml version="1.0" encoding="UTF-8"?-->
<svg width="500" height="350" viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">

    <defs>

        <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff6b81"></stop>
            <stop offset="100%" stop-color="#ff2d55"></stop>
        </linearGradient>

        <linearGradient id="flapGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ff9bb0"></stop>
            <stop offset="100%" stop-color="#ff4d6d"></stop>
        </linearGradient>

        <filter id="shadow">
            <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#00000055"></feDropShadow>
        </filter>

    </defs>

    <!-- Envelope Body -->

    <rect x="50" y="90" width="400" height="220" rx="18" fill="url(#bodyGrad)" filter="url(#shadow)"></rect>

    <!-- Left Fold -->

    <polygon points="50,90 250,220 50,310" fill="#ff7f96"></polygon>

    <!-- Right Fold -->

    <polygon points="450,90 250,220 450,310" fill="#ff5d7c"></polygon>

    <!-- Bottom Fold -->

    <polygon points="50,310 250,180 450,310" fill="#ff8fa3"></polygon>

    <!-- Top Flap -->

    <polygon points="50,90 250,10 450,90" fill="url(#flapGrad)"></polygon>

    <!-- Heart Seal -->

    <path d="M250 125
           C240 105 205 105 205 135
           C205 165 250 190 250 190
           C250 190 295 165 295 135
           C295 105 260 105 250 125Z" fill="white"></path>

</svg>